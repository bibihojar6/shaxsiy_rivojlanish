<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#130d2a"/>
<title>MenYo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════
   TOKENS
═══════════════════════════ */
:root{
  /* ── Binafsha kosmik tema ── */
  --bg:#130d2a;          /* #0F0A1F ga yaqin, biroz ochroq */
  --s1:#1e1640;          /* #1B1535 asosida — kartochka */
  --s2:#2a1f58;          /* #3A2A6A ga yaqin, o'rta */
  --s3:#3a2a6a;          /* to'q binafsha surface */
  --bd:rgba(179,108,255,.15);
  --bd2:rgba(179,108,255,.25);

  /* ── Binafsha-limon oltin ── */
  --gold:#d4a0ff;        /* #D6A8FF — yumshoq binafsha-oltin */
  --gold2:#b36cff;       /* #B36CFF — yorqin binafsha */
  --goldl:rgba(179,108,255,.13);

  /* ── Platina oq-binafsha ── */
  --silver:#c8caef;      /* oq-binafsha platina */
  --silver2:#e2e4f8;     /* yorqin platina-oq */
  --silverl:rgba(200,202,239,.12);

  /* ── Ko'k-indigo ── */
  --blue:#6a7cff;        /* #6A7CFF — elektrik ko'k */
  --blue2:#8b9aff;       /* yorqin indigo */
  --bluel:rgba(106,124,255,.13);

  /* ── Teal — binafsha-ko'k ── */
  --teal:#c04a8b;        /* #C04A8B — magenta-binafsha */
  --teal2:#f2a1d1;       /* #F2A1D1 — pushti yumshoq */
  --teall:rgba(192,74,139,.12);

  /* ── Qizil-pushti ── */
  --rose:#f2a1d1;        /* #F2A1D1 — yumshoq pushti */
  --rose2:#ff7eb3;       /* yorqin pushti */
  --rosel:rgba(242,161,209,.13);

  /* ── Yashil (sage — ikkinchi) ── */
  --sage:#8b9aff;
  --violet:#d6a8ff;

  /* ── Matn — yorqin, to'q emas ── */
  --t1:#f0ecff;          /* deyarli oq, binafsha soyasi */
  --t2:#b8aed8;          /* o'rta — lavanda */
  --t3:#7a6fa0;          /* muted — to'q lavanda */

  --nav:56px;
  --bot:64px;
  --r:12px;
  --r2:8px;

  --ff:'DM Sans',sans-serif;
  --fd:'Fraunces',serif;
  --fc:'Caveat',cursive;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}

body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--ff);
  font-size:15px;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(179,108,255,.3);border-radius:2px;}

/* ═══════════════════════════
   TYPOGRAPHY
═══════════════════════════ */
.fd{font-family:var(--fd);}
.fc{font-family:var(--fc);}
.t1{color:var(--t1);}
.t2{color:var(--t2);}
.t3{color:var(--t3);}
.gold{color:var(--gold);}
.teal{color:var(--teal);}
.rose{color:var(--rose);}
.sage{color:var(--sage);}

/* ═══════════════════════════
   LAYOUT
═══════════════════════════ */
#auth-screen{
  position:fixed;inset:0;z-index:600;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
  overflow-y:auto;
}

#app{display:none;}
#app.on{display:block;}

/* top nav — desktop only */
#topnav{
  position:fixed;top:0;left:0;right:0;height:var(--nav);
  background:rgba(19,13,42,.94);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
  z-index:100;
  display:flex;align-items:center;
  padding:0 1rem;gap:.5rem;
}
.tnlogo{
  font-family:var(--fd);font-style:italic;font-size:1.3rem;
  color:var(--t1);margin-right:.75rem;white-space:nowrap;
}
.tnlogo b{color:var(--gold);font-style:normal;}
.tnlinks{display:flex;gap:.25rem;flex:1;overflow:hidden;}
.tnbtn{
  display:flex;align-items:center;gap:.35rem;
  padding:.38rem .85rem;
  background:none;border:none;
  color:var(--t2);font-family:var(--ff);font-size:.82rem;font-weight:500;
  cursor:pointer;border-radius:20px;transition:all .2s;
  white-space:nowrap;
}
.tnbtn:hover{color:var(--t1);background:rgba(179,108,255,.08);}
.tnbtn.on{color:var(--gold2);background:var(--goldl);}
.tnright{display:flex;align-items:center;gap:.6rem;margin-left:auto;}
.nav-av{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--gold);
  background:var(--s2);
  overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex-shrink:0;
}
.nav-av img{width:100%;height:100%;object-fit:cover;}

/* bottom nav — mobile */
#botnav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bot);
  background:rgba(19,13,42,.97);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  z-index:100;
  display:none;
  grid-template-columns:repeat(5,1fr);
  align-items:center;
}
.bnbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;height:100%;
  background:none;border:none;
  color:var(--t3);font-family:var(--ff);font-size:.6rem;font-weight:500;
  cursor:pointer;transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.bnbtn .ico{font-size:1.25rem;line-height:1;transition:transform .2s;}
.bnbtn.on{color:var(--gold);}
.bnbtn.on .ico{transform:scale(1.15);}

/* pages */
.pg{
  display:none;
  padding-top:var(--nav);
  padding-bottom:4px;
  min-height:100dvh;
  animation:fu .28s ease;
}
.pg.on{display:block;}

@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* mobile page padding */
@media(max-width:639px){
  #topnav{display:none;}
  #botnav{display:grid;}
  .pg{padding-top:8px;padding-bottom:calc(var(--bot) + 8px);}
}
@media(min-width:640px){
  #botnav{display:none;}
}

.wrap{max-width:1000px;margin:0 auto;padding:1.25rem 1rem;}

/* ═══════════════════════════
   COMPONENTS
═══════════════════════════ */

/* Card */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:1.1rem;box-shadow:0 2px 16px rgba(90,60,160,.18);}

/* Chip */
.chip{
  display:inline-flex;align-items:center;gap:.3rem;
  font-family:var(--fc);font-size:.78rem;
  padding:.18rem .65rem;border-radius:10px;
}
.chip-gold{background:var(--goldl);color:var(--gold);border:1px solid rgba(196,154,26,.2);}
.chip-teal{background:var(--bluel);color:var(--blue);border:1px solid rgba(45,95,166,.15);}
.chip-rose{background:var(--rosel);color:var(--rose);border:1px solid rgba(192,57,43,.15);}
.chip-sage{background:rgba(114,184,114,.13);color:var(--sage);}
.chip-vi{background:rgba(92,111,168,.1);color:var(--violet);border:1px solid rgba(92,111,168,.15);}
.chip-dim{background:rgba(179,108,255,.08);color:var(--t2);}

/* Pill tabs */
.ptabs{display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{
  padding:.38rem 1rem;
  background:none;border:1px solid var(--bd2);
  color:var(--t2);font-family:var(--ff);font-size:.8rem;font-weight:500;
  cursor:pointer;border-radius:20px;transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.ptab.on,.ptab:active{background:rgba(184,133,10,.09);border-color:var(--gold);color:var(--gold);}

/* Section heading */
.sh{
  font-family:var(--fd);font-style:italic;
  font-size:1.05rem;color:var(--t1);
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.85rem;
}
.sh-act{
  font-family:var(--fc);font-size:.82rem;color:var(--gold);
  background:none;border:none;cursor:pointer;padding:0;
}

/* form */
.fl{margin-bottom:.85rem;}
.fl label{
  display:block;font-size:.72rem;font-weight:600;
  color:var(--t2);letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:.3rem;
}
.fi{
  width:100%;
  background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--r2);
  padding:.6rem .9rem;
  color:var(--t1);font-family:var(--ff);font-size:.9rem;
  outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.fi:focus{border-color:var(--gold);}
textarea.fi{resize:vertical;min-height:72px;}
select.fi option{background:var(--s2);}
input[type="range"]{accent-color:var(--gold);width:100%;}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.65rem 1.25rem;
  border:none;border-radius:var(--r2);
  font-family:var(--ff);font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.btn-full{width:100%;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0f00;}
.btn-gold:active{transform:scale(.97);}
.btn-teal{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--t2);}
.btn-ghost:hover{border-color:var(--bd2);color:var(--t1);}
.btn-sm{padding:.38rem .9rem;font-size:.78rem;}
.btn-rose{background:rgba(192,96,74,.13);border:1px solid rgba(232,112,112,.3);color:var(--rose);}

/* Progress bar */
.pbar{height:6px;background:rgba(179,108,255,.08);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;transition:width .5s ease;}

/* Lang switcher */
.lang-sw{display:flex;gap:.3rem;}
.lang-btn{
  padding:.25rem .6rem;background:var(--s2);
  border:1px solid var(--bd);border-radius:6px;
  font-size:.72rem;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all .15s;
}
.lang-btn.on{background:rgba(184,133,10,.10);border-color:var(--gold);color:var(--gold);}

/* Toast */
#toast{
  position:fixed;bottom:calc(var(--bot) + .75rem);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--s2);border:1px solid var(--bd2);
  border-left:3px solid var(--gold2);
  border-radius:var(--r2);padding:.6rem 1.1rem;
  font-size:.85rem;color:var(--t1);
  z-index:999;opacity:0;pointer-events:none;
  transition:all .25s;white-space:nowrap;
  max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:640px){#toast{bottom:1.5rem;right:1.5rem;left:auto;transform:translateX(0) translateY(8px);}
#toast.show{transform:translateX(0) translateY(0);}}

/* ═══════════════════════════
   AUTH
═══════════════════════════ */
.auth-box{
  width:100%;max-width:400px;
  background:var(--s1);border:1px solid var(--bd2);
  border-radius:18px;padding:2rem 1.75rem;
  position:relative;overflow:hidden;
}
.auth-box::before{
  content:'';position:absolute;
  top:-80px;right:-80px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(184,133,10,.10),transparent 70%);
  border-radius:50%;pointer-events:none;
}
.auth-logo{font-family:var(--fd);font-style:italic;font-size:1.9rem;color:var(--t1);margin-bottom:.15rem;}
.auth-logo b{color:var(--gold);font-style:normal;}
.auth-sub{font-family:var(--fc);color:var(--t2);font-size:.9rem;margin-bottom:1.75rem;}
.atabs{display:flex;background:var(--s2);border-radius:9px;padding:3px;margin-bottom:1.5rem;}
.atab{flex:1;padding:.45rem;background:none;border:none;
  color:var(--t2);font-family:var(--ff);font-size:.85rem;font-weight:500;
  cursor:pointer;border-radius:7px;transition:all .2s;}
.atab.on{background:var(--s1);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.auth-divider{text-align:center;color:var(--t3);font-size:.78rem;margin:.9rem 0;position:relative;}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--bd2);}
.auth-divider::before{left:0;}.auth-divider::after{right:0;}
.gbtn{
  width:100%;padding:.62rem;background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--r2);color:var(--t1);font-family:var(--ff);font-size:.85rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;
  transition:all .15s;
}
.gbtn:active{background:var(--s3);}
.demo-hint{text-align:center;font-size:.72rem;color:var(--t3);margin-top:.75rem;}
.auth-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}

/* ═══════════════════════════
   DASHBOARD
═══════════════════════════ */
.dash-hero{
  padding:1.5rem 1rem 1rem;
  background:linear-gradient(160deg,rgba(184,133,10,.05) 0%,transparent 55%);
  border-bottom:1px solid var(--bd);
}
.dash-hi{font-family:var(--fd);font-style:italic;font-size:clamp(1.5rem,5vw,2.2rem);color:var(--t1);line-height:1.2;}
.dash-hi span{color:var(--gold);}
.dash-date{font-family:var(--fc);color:var(--t2);font-size:.88rem;margin-top:.3rem;}

.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:.6rem;margin-bottom:1.1rem;
}
@media(max-width:480px){.stats-row{grid-template-columns:repeat(2,1fr);}}

.scard{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);padding:.85rem .75rem;
  position:relative;overflow:hidden;
}
.scard::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2.5px;border-radius:0 0 var(--r) var(--r);
}
.scard.c-gold::after{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.scard.c-teal::after{background:linear-gradient(90deg,var(--blue),var(--silver));}
.scard.c-rose::after{background:linear-gradient(90deg,var(--rose),var(--rose2));}
.scard.c-sage::after{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.scard-n{font-family:var(--fd);font-size:1.7rem;font-weight:600;color:var(--t1);line-height:1;}
.scard-l{font-family:var(--fc);font-size:.78rem;color:var(--t2);margin-top:.25rem;}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
@media(max-width:560px){.dash-grid{grid-template-columns:1fr;}}

/* quote widget */
.qcard{
  background:linear-gradient(135deg,rgba(184,133,10,.08),rgba(61,191,176,.06));
  border:1px solid rgba(184,133,10,.15);
  border-radius:var(--r);padding:1.25rem;position:relative;overflow:hidden;
}
.qcard::before{content:'"';position:absolute;top:-.4rem;left:.6rem;
  font-family:serif;font-size:5rem;color:var(--gold);opacity:.12;line-height:1;}
.qt{font-family:var(--fd);font-style:italic;font-size:.97rem;color:var(--t1);line-height:1.6;position:relative;}
.qa{font-family:var(--fc);color:var(--teal);font-size:.85rem;margin-top:.6rem;}

/* ring */
.ring-row{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;}
.ring-info .val{font-family:var(--fd);font-size:1.4rem;font-weight:600;color:var(--t1);}
.ring-info .sub{font-family:var(--fc);font-size:.8rem;color:var(--t2);}

/* book row */
.brow{display:flex;align-items:center;gap:.65rem;padding:.5rem 0;border-bottom:1px solid var(--bd);}
.brow:last-child{border-bottom:none;}
.brow-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0;}
.brow-title{font-family:var(--fd);font-style:italic;font-size:.85rem;color:var(--t1);}
.brow-author{font-family:var(--fc);font-size:.75rem;color:var(--t2);}

/* task row mini */
.trow-mini{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--bd);}
.trow-mini:last-child{border-bottom:none;}
.tchk{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:.55rem;color:white;flex-shrink:0;}
.tchk.dn{background:var(--sage);border-color:var(--sage);}
.trow-mini span{font-size:.83rem;color:var(--t1);}
.trow-mini span.dn{text-decoration:line-through;color:var(--t3);}

/* ═══════════════════════════
   LIBRARY
═══════════════════════════ */
.search-row{position:relative;}
.search-row input{padding-left:2.2rem !important;}
.search-ic{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--t3);pointer-events:none;}

.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:.85rem;
}
@media(max-width:380px){.books-grid{grid-template-columns:1fr 1fr;}}

.bcard{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);overflow:hidden;
  transition:transform .2s,border-color .2s;
  cursor:pointer;
}
.bcard:active{transform:scale(.97);}
.bcard-spine{height:5px;}
.bcard-body{padding:.9rem .85rem;}
.bcard-title{font-family:var(--fd);font-style:italic;font-size:.9rem;color:var(--t1);margin-bottom:.2rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.bcard-auth{font-family:var(--fc);font-size:.8rem;color:var(--t2);margin-bottom:.45rem;}
.bcard-stars{font-size:.75rem;color:var(--gold);margin-bottom:.4rem;}
.bcard-rev{font-size:.73rem;color:var(--t2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.55rem;}

/* material card */
.mcard{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);padding:1rem;
  display:flex;flex-direction:column;gap:.5rem;
  transition:border-color .2s;cursor:pointer;
}
.mcard:active{transform:scale(.98);}
.mcard-title{font-family:var(--fd);font-style:italic;font-size:.92rem;color:var(--t1);}
.mcard-desc{font-size:.78rem;color:var(--t2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mcard-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.15rem;}
.mcard-auth{font-family:var(--fc);font-size:.78rem;color:var(--t2);}
.mcard-link{font-size:.75rem;color:var(--teal);text-decoration:none;}

.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.85rem;}
@media(max-width:560px){.mat-grid{grid-template-columns:1fr;}}

/* ═══════════════════════════
   COMMUNITY
═══════════════════════════ */
.rev-card{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);padding:1rem;margin-bottom:.75rem;
}
.rev-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem;}
.rev-av{
  width:36px;height:36px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;overflow:hidden;
}
.rev-av img{width:100%;height:100%;object-fit:cover;}
.rev-name{font-size:.88rem;font-weight:600;color:var(--t1);}
.rev-meta{font-family:var(--fc);font-size:.75rem;color:var(--t2);}
.rev-stars{color:var(--gold);font-size:.78rem;margin-left:auto;}
.rev-book{font-family:var(--fd);font-style:italic;font-size:.82rem;color:var(--blue);margin-bottom:.4rem;}
.rev-txt{font-size:.85rem;color:var(--t2);line-height:1.6;}
.rev-foot{display:flex;gap:.85rem;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--bd);}
.rev-act{background:none;border:none;color:var(--t2);font-family:var(--ff);font-size:.78rem;
  cursor:pointer;display:flex;align-items:center;gap:.25rem;transition:color .15s;}
.rev-act:hover,.rev-act:active{color:var(--gold);}

.write-box{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);padding:1rem;margin-bottom:1.1rem;
}
.write-box-title{font-family:var(--fd);font-style:italic;font-size:.97rem;color:var(--t1);margin-bottom:.85rem;}
.write-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem;}
@media(max-width:400px){.write-row{grid-template-columns:1fr;}}

.reco-card{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r);padding:1rem;margin-bottom:.75rem;
  display:flex;gap:1rem;align-items:flex-start;
  transition:border-color .2s;
}
.reco-rank{font-family:var(--fd);font-size:1.4rem;font-weight:600;color:var(--gold2);opacity:.5;width:28px;flex-shrink:0;line-height:1;}
.reco-body{flex:1;}
.reco-title{font-family:var(--fd);font-style:italic;font-size:.93rem;color:var(--t1);margin-bottom:.15rem;}
.reco-auth{font-family:var(--fc);font-size:.8rem;color:var(--t2);}
.reco-why{font-size:.78rem;color:var(--t2);line-height:1.5;margin-top:.3rem;}
.vote-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(184,133,10,.07);border:1px solid rgba(184,133,10,.15);
  border-radius:var(--r2);padding:.4rem .6rem;
  color:var(--gold);font-family:var(--fd);font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.vote-btn:active{background:rgba(184,133,10,.15);}
.vote-ic{font-size:.7rem;}

/* ═══════════════════════════
   MY PAGE
═══════════════════════════ */
/* tasks */
.task-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.8rem .9rem;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--r2);margin-bottom:.5rem;
  cursor:pointer;transition:border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.task-item.dn{opacity:.5;}
.task-item:active{background:var(--s2);}
.tchk2{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;color:white;flex-shrink:0;transition:all .2s;
}
.task-item.dn .tchk2{background:var(--sage);border-color:var(--sage);}
.task-txt{flex:1;font-size:.88rem;color:var(--t1);}
.task-item.dn .task-txt{text-decoration:line-through;color:var(--t3);}
.task-del{background:none;border:none;color:var(--t3);font-size:.85rem;cursor:pointer;
  padding:.2rem;border-radius:4px;transition:color .15s;opacity:0;}
.task-item:hover .task-del,.task-item:active .task-del{opacity:1;}

.add-row{display:flex;gap:.5rem;}
.add-row input{flex:1;}
.add-row select{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r2);
  padding:.6rem .7rem;color:var(--t1);font-family:var(--ff);font-size:.82rem;outline:none;
  -webkit-appearance:none;}

.goal-item{
  background:var(--s1);border:1px solid var(--bd);
  border-left:3px solid;border-radius:0 var(--r2) var(--r2) 0;
  padding:.9rem 1rem;margin-bottom:.6rem;
  transition:transform .2s;
}
.goal-item:active{transform:translateX(3px);}
.goal-name{font-family:var(--fd);font-style:italic;font-size:.93rem;color:var(--t1);margin-bottom:.15rem;}
.goal-desc{font-size:.78rem;color:var(--t2);line-height:1.4;margin-bottom:.55rem;}
.goal-foot{display:flex;justify-content:space-between;margin-top:.3rem;}

/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.1rem;}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.scard2{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;text-align:center;}
.scard2 .ico{font-size:1.5rem;margin-bottom:.4rem;}
.scard2 .val{font-family:var(--fd);font-size:1.6rem;font-weight:600;color:var(--t1);}
.scard2 .lbl{font-family:var(--fc);font-size:.78rem;color:var(--t2);margin-top:.15rem;}

.habit-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem;flex-wrap:wrap;}
.habit-name{font-size:.82rem;color:var(--t1);width:110px;flex-shrink:0;}
.hdots{display:flex;gap:4px;}
.hdot{
  width:24px;height:24px;border-radius:4px;
  background:rgba(179,108,255,.07);border:1px solid var(--bd2);
  display:flex;align-items:center;justify-content:center;font-size:.58rem;
  cursor:pointer;transition:all .15s;
}
.hdot.g{background:rgba(107,143,94,.18);border-color:var(--sage);color:var(--sage);}
.hdot.y{background:rgba(184,133,10,.15);border-color:var(--gold);color:var(--gold);}
.hpct{font-family:var(--fc);font-size:.78rem;color:var(--t2);margin-left:auto;}

/* motivation box */
.motiv-box{
  background:linear-gradient(135deg,#2a1f58,#3a2a6a);
  border:1px solid var(--bd2);border-radius:var(--r);
  padding:1.5rem;text-align:center;
}
.motiv-q{font-family:var(--fd);font-style:italic;font-size:1.05rem;color:var(--t1);line-height:1.55;margin-bottom:.5rem;}
.motiv-a{font-family:var(--fc);color:var(--teal);font-size:.88rem;margin-bottom:1rem;}

/* profile */
.p-hero{
  background:linear-gradient(135deg,rgba(184,133,10,.06),rgba(74,124,111,.04));
  border:1px solid var(--bd);border-radius:var(--r);
  padding:1.25rem;margin-bottom:1.1rem;
  display:flex;gap:1.1rem;align-items:flex-start;
}
.p-av{
  width:80px;height:80px;border-radius:50%;
  border:2px solid var(--gold);padding:2px;flex-shrink:0;position:relative;
}
.p-av-inner{
  width:100%;height:100%;border-radius:50%;
  background:var(--s2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:2rem;
}
.p-av-inner img{width:100%;height:100%;object-fit:cover;}
.p-cam{
  position:absolute;bottom:1px;right:1px;
  width:24px;height:24px;border-radius:50%;
  background:var(--gold);border:2px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;cursor:pointer;
}
.p-name{font-family:var(--fd);font-style:italic;font-size:1.35rem;color:var(--t1);}
.p-tagline{font-family:var(--fc);color:var(--teal);font-size:.88rem;margin:.15rem 0 .5rem;}
.p-bio{font-size:.82rem;color:var(--t2);line-height:1.6;margin-bottom:.65rem;}
.p-tags{display:flex;flex-wrap:wrap;gap:.3rem;}

.p-secs{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
@media(max-width:520px){.p-secs{grid-template-columns:1fr;}}
.p-sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;}
.p-sec.full{grid-column:1/-1;}
.p-sec-h{
  font-family:var(--fd);font-style:italic;font-size:.95rem;color:var(--t1);
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.85rem;
}
.p-add{
  font-family:var(--fc);font-size:.75rem;color:var(--teal);
  background:none;border:1px solid rgba(74,124,111,.2);
  padding:.15rem .55rem;border-radius:10px;cursor:pointer;
}

.sk-item{margin-bottom:.7rem;}
.sk-top{display:flex;justify-content:space-between;margin-bottom:.25rem;}
.sk-n{font-size:.82rem;color:var(--t1);}
.sk-p{font-family:var(--fc);font-size:.75rem;color:var(--t2);}
.sk-bar{height:4px;background:rgba(179,108,255,.08);border-radius:2px;overflow:hidden;}
.sk-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold2),var(--blue));}

.ach-item{
  display:flex;gap:.75rem;align-items:flex-start;
  padding:.75rem;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--r2);margin-bottom:.5rem;
}
.ach-ico{font-size:1.35rem;flex-shrink:0;line-height:1;}
.ach-info h5{font-family:var(--fd);font-style:italic;font-size:.88rem;color:var(--t1);margin-bottom:.1rem;}
.ach-info p{font-size:.75rem;color:var(--t2);line-height:1.4;}
.ach-info span{font-family:var(--fc);font-size:.72rem;color:var(--teal);}

.soc-link{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem .75rem;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--r2);text-decoration:none;color:var(--t1);font-size:.83rem;
  margin-bottom:.4rem;transition:border-color .15s;
}
.soc-link:hover,.soc-link:active{border-color:var(--gold2);}
.soc-link span:last-child{margin-left:auto;font-size:.72rem;color:var(--t3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;}

/* ═══════════════════════════
   ADMIN
═══════════════════════════ */
.adm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.1rem;}
@media(min-width:480px){.adm-grid{grid-template-columns:repeat(4,1fr);}}

.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.dt{width:100%;border-collapse:collapse;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;}
table.dt th{background:var(--s3);padding:.6rem .85rem;text-align:left;font-size:.72rem;font-weight:600;
  color:var(--t2);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--bd);}
table.dt td{padding:.65rem .85rem;font-size:.82rem;color:var(--t1);border-bottom:1px solid var(--bd);}
table.dt tr:last-child td{border-bottom:none;}
table.dt tr:hover td{background:rgba(179,108,255,.06);}
.ta{background:none;border:none;cursor:pointer;font-size:.78rem;padding:.2rem .45rem;border-radius:4px;transition:all .15s;}
.ta-del{color:var(--rose);}.ta-del:hover{background:rgba(192,96,74,.09);}
.ta-ed{color:var(--blue);}.ta-ed:hover{background:var(--bluel);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.3rem;}
.dot-g{background:var(--sage);}.dot-y{background:var(--gold);}.dot-r{background:var(--rose);}

/* admin badge */
.abadge{font-size:.65rem;background:var(--rose2);color:white;padding:.1rem .4rem;border-radius:6px;font-weight:700;}

/* ═══════════════════════════
   MODAL
═══════════════════════════ */
.mo{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  z-index:400;align-items:flex-end;justify-content:center;
  padding:0;
}
.mo.open{display:flex;animation:mo-in .22s ease;}
@media(min-width:500px){.mo{align-items:center;padding:1rem;}}
@keyframes mo-in{from{opacity:0;}to{opacity:1;}}

.mbox{
  background:var(--s1);border:1px solid var(--bd2);
  border-radius:18px 18px 0 0;
  padding:1.5rem 1.25rem 2rem;
  width:100%;max-width:480px;
  max-height:90dvh;overflow-y:auto;
  animation:mo-slide .25s ease;
}
@media(min-width:500px){.mbox{border-radius:18px;padding:1.75rem 1.5rem;}}
@keyframes mo-slide{from{transform:translateY(30px);}to{transform:translateY(0);}}

.mbox h3{font-family:var(--fd);font-style:italic;font-size:1.25rem;color:var(--t1);margin-bottom:1.25rem;}
.mactions{display:flex;gap:.6rem;margin-top:1.25rem;}
.mhandle{
  width:36px;height:4px;background:var(--s3);border-radius:2px;
  margin:0 auto .75rem;
}

/* ═══════════════════════════
   UTILS
═══════════════════════════ */
.mt{margin-top:1rem;}.mb{margin-bottom:1rem;}
.mt2{margin-top:1.5rem;}
.empty{text-align:center;font-family:var(--fc);color:var(--t3);font-size:.9rem;padding:2rem;}
</style>
</head>

<!-- top nav (desktop) -->

    <div class="dash-date" id="d-date"></div>

  <div class="wrap">

          <div class="fl" style="margin:0"><label id="wrt-book-l"></label><input class="fi" type="text" id="rv-book"/></div>

/* ── AUTH ── */
function aswitch(tab){
  document.getElementById('aform-in').style.display=tab==='in'?'':'none';
  document.getElementById('aform-up').style.display=tab==='up'?'':'none';
  document.getElementById('atab-in').classList.toggle('on',tab==='in');
  document.getElementById('atab-up').classList.toggle('on',tab==='up');
}
function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const u=DEMO_USERS.find(u=>u.email===email&&u.pass===pass)||
          (email&&pass?{email,pass,name:email.split('@')[0],isAdmin:false}:null);
  if(!u){toast(t('loginError'));return;}
  loginOk(u);
}
function doReg(){
  const name=document.getElementById('r-name').value.trim();
  if(!name){toast(t('fieldRequired'));return;}
  const u={email:document.getElementById('r-email').value,pass:document.getElementById('r-pass').value,name,isAdmin:false};
  DEMO_USERS.push(u);loginOk(u);
}
function loginOk(u){
  curUser=u;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('on');
  if(u.isAdmin){document.getElementById('tn-adm').style.display='';document.getElementById('bn-adm').style.display='';}
  if(prof.name==='Ismingiz') prof.name=u.name;
  applyLang();renderAll();
}
function logout(){
  curUser=null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').classList.remove('on');
}

function renderDash(){
  const now=new Date();
  const h=now.getHours();
  const greet=h<12?t('greetMorning'):h<18?t('greetDay'):t('greetEvening');
  const uname=curUser?curUser.name.split(' ')[0]:(t('hello'));
  document.getElementById('d-hi').textContent=greet+', '+uname+' 👋';
  document.getElementById('d-date').textContent=DAYS[lang][now.getDay()]+', '+now.getDate()+' '+MONTHS[lang][now.getMonth()]+' '+now.getFullYear();

  const readCnt=books.filter(b=>b.status==='read').length;
  const doneCnt=tasks.filter(t2=>t2.done).length;
  const pct=tasks.length?Math.round(doneCnt/tasks.length*100):0;

  document.getElementById('d-stats').innerHTML=`
    <div class="scard c-gold"><div class="scard-n">${readCnt}</div><div class="scard-l">📚 ${t('books')}</div></div>
    <div class="scard c-teal"><div class="scard-n">${doneCnt}</div><div class="scard-l">✅ ${t('doneLabel')}</div></div>
    <div class="scard c-rose"><div class="scard-n">7</div><div class="scard-l">🔥 ${t('streakLabel')}</div></div>
    <div class="scard c-sage"><div class="scard-n">${mats.length}</div><div class="scard-l">🎓 ${t('materials')}</div></div>
  `;

  document.getElementById('d-tasks-h').textContent=t('plans');
  document.getElementById('d-all').textContent=t('allTasks');
  document.getElementById('d-tasks-list').innerHTML=tasks.slice(0,3).map(t2=>`
    <div class="trow-mini">
      <div class="tchk ${t2.done?'dn':''}">${t2.done?'✓':''}</div>
      <span class="${t2.done?'dn':''}">${t2.text}</span>
    </div>
  `).join('')+`<div class="fc t2" style="font-size:.78rem;margin-top:.4rem">${pct}% ${t('doneLabel').toLowerCase()}</div>`;

  document.getElementById('d-books-h').textContent=t('books');
  document.getElementById('d-lib-a').textContent=t('allBooks');
  document.getElementById('d-books-list').innerHTML=books.slice(0,3).map(b=>`
    <div class="brow">
      <div class="brow-bar" style="background:${b.color}"></div>
      <div><div class="brow-title">${b.title}</div><div class="brow-author">${b.author}</div></div>
    </div>
  `).join('');

  // ring
  const offset=163.4-(pct/100)*163.4;
  document.getElementById('d-ring').style.strokeDashoffset=offset;
  document.getElementById('d-rpct').textContent=pct+'%';
  document.getElementById('d-rsub').textContent=t('doneLabel');
  document.getElementById('d-streak-l').textContent=t('streakLabel');
  const dph=document.getElementById('d-prog-h');
  if(dph) dph.textContent=t('stats');

  renderQ();
}
function renderQ(){

/* ── BOOKS ── */
function renderBooks(){
  const q=(document.getElementById('b-search')||{value:''}).value.toLowerCase();
  const filtered=books.filter(b=>(bFil==='all'||b.status===bFil)&&(!q||b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)));
  const chipMap={read:`chip-sage`,reading:`chip-gold`,list:`chip-dim`};
  const lblMap=()=>({read:'✅ '+t('read'),reading:'📖 '+t('reading'),list:'📋 '+t('list')});
  document.getElementById('books-grid').innerHTML=filtered.length?filtered.map(b=>`
    <div class="bcard">
      <div class="bcard-spine" style="background:${b.color}"></div>
      <div class="bcard-body">
        <div class="bcard-title">${b.title}</div>
        <div class="bcard-auth">— ${b.author}</div>
        ${b.rating?`<div class="bcard-stars">${'⭐'.repeat(b.rating)}</div>`:''}
        ${b.review?`<div class="bcard-rev">${b.review}</div>`:''}
        <span class="chip ${chipMap[b.status]}">${lblMap()[b.status]}</span>
      </div>
    </div>
  `).join(''):`<div class="empty" style="grid-column:1/-1">${t('noResults')}</div>`;
}
function bFilter(f,el){
  bFil=f;
  document.querySelectorAll('#lib-books-sec .ptab').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  renderBooks();
}
function saveBook(){
  const title=document.getElementById('mb-title').value.trim();
  if(!title){toast(t('fieldRequired'));return;}
  books.unshift({id:Date.now(),title,
    author:document.getElementById('mb-auth').value.trim()||'—',
    status:document.getElementById('mb-status').value,
    rating:+document.getElementById('mb-rating').value,
    review:document.getElementById('mb-rev').value.trim(),
    color:document.getElementById('mb-color').value,
  });
  sv('MY_books',books);closeM('m-book');
  ['mb-title','mb-auth','mb-rev'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  renderBooks();renderDash();toast(t('added'));
}

        <button class="rev-act" onclick="likeRev(${r.id})">👍 ${r.likes}</button>
        <button class="rev-act">💬</button>
      </div>
    </div>
  `).join('')||`<div class="empty">${t('empty')}</div>`;
}
function likeRev(id){const r=revs.find(r=>r.id===id);if(r){r.likes++;sv('MY_revs',revs);renderRevs();}}
function postRev(){
  const book=document.getElementById('rv-book').value.trim();
  const txt=document.getElementById('rv-txt').value.trim();
  if(!book||!txt){toast(t('fieldRequired'));return;}
  revs.unshift({id:Date.now(),user:curUser?curUser.name:'Mehmon',av:'👤',avImg:prof.av,book,
    rat:+document.getElementById('rv-rat').value,txt,likes:0,
    date:new Date().toLocaleDateString()});
  sv('MY_revs',revs);
  ['rv-book','rv-txt'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  renderRevs();toast(t('added'));
}

/* ── RECOS ── */
const catColors={kitob:'chip-gold',kurs:'chip-teal',video:'chip-rose',boshqa:'chip-dim'};
function renderRecos(){
  document.getElementById('reco-list').innerHTML=recos.map((r,i)=>`
    <div class="reco-card">
      <div class="reco-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="reco-body">
        <div class="reco-title">${r.title}</div>
        <div class="reco-auth">— ${r.author}</div>
        <div class="reco-why">${r.why}</div>
        <span class="chip ${catColors[r.cat]||'chip-dim'}" style="margin-top:.4rem;display:inline-flex">${r.cat}</span>
      </div>
      <button class="vote-btn" onclick="voteReco(${r.id})">
        <span class="vote-ic">▲</span>${r.votes}
      </button>
    </div>

}
function voteReco(id){
  const r=recos.find(r=>r.id===id);
  if(r){r.votes++;recos.sort((a,b)=>b.votes-a.votes);sv('MY_recos',recos);renderRecos();}
}
function saveReco(){
  const title=document.getElementById('rc-title').value.trim();
  if(!title){toast(t('fieldRequired'));return;}
  recos.unshift({id:Date.now(),title,
    author:document.getElementById('rc-auth').value.trim()||'—',
    why:document.getElementById('rc-why').value.trim(),
    cat:document.getElementById('rc-cat').value,votes:1});
  recos.sort((a,b)=>b.votes-a.votes);
  sv('MY_recos',recos);closeM('m-reco');
  ['rc-title','rc-auth','rc-why'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  renderRecos();toast(t('added'));
}

/* ── TASKS / PLANS ── */
function setDayLabel(){
  const d=new Date();d.setDate(d.getDate()+_dayOff);
  document.getElementById('day-lbl').textContent=DAYS[lang][d.getDay()]+', '+d.getDate()+' '+MONTHS[lang][d.getMonth()];
}
function dayOff2(dir){_dayOff+=dir;setDayLabel();renderTasks();}
window.dayOff=dayOff2; // expose

function renderTasks(){
  const done=tasks.filter(t2=>t2.done).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pln-pct').textContent=pct+'%';
  document.getElementById('pln-fill').style.width=pct+'%';
  const catIco={kitob:'📚',sport:'💪',maqsad:'🎯',shaxsiy:'✨'};
  const catCls={kitob:'chip-gold',sport:'chip-sage',maqsad:'chip-rose',shaxsiy:'chip-teal'};
  document.getElementById('task-list').innerHTML=tasks.map(t2=>`
    <div class="task-item ${t2.done?'dn':''}" onclick="toggleTask(${t2.id})">
      <div class="tchk2">${t2.done?'✓':''}</div>
      <div class="task-txt">${t2.text}</div>
      <span class="chip ${catCls[t2.cat]||'chip-dim'}" style="font-size:.72rem">${catIco[t2.cat]||'✨'}</span>
      <button class="task-del" onclick="event.stopPropagation();delTask(${t2.id})">✕</button>
    </div>
  `).join('')||`<div class="empty">${t('empty')}</div>`;
}
function toggleTask(id){const t2=tasks.find(t=>t.id===id);if(t2){t2.done=!t2.done;sv('MY_tasks',tasks);renderTasks();renderDash();}}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);sv('MY_tasks',tasks);renderTasks();}
function addTask(){
  const inp=document.getElementById('new-task');
  const txt=inp.value.trim();if(!txt)return;
  tasks.push({id:Date.now(),text:txt,cat:document.getElementById('new-cat').value,done:false});
  inp.value='';sv('MY_tasks',tasks);renderTasks();
}
function renderGoals(){
  document.getElementById('goals-list').innerHTML=wGoals.map(g=>`
    <div class="goal-item" style="border-left-color:${g.c}">
      <div class="goal-name">${g.name}</div>
      <div class="goal-desc">${g.desc}</div>
      <div class="pbar"><div class="pfill" style="width:${g.prog}%;background:${g.c}"></div></div>
      <div class="goal-foot"><span class="fc t2" style="font-size:.72rem">${g.prog}%</span></div>
    </div>
  `).join('');
}

/* ── STATS ── */
function renderStats(){
  const readCnt=books.filter(b=>b.status==='read').length;
  const doneCnt=tasks.filter(t2=>t2.done).length;
  const rated=books.filter(b=>b.rating>0);
  const avg=rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):'—';
  document.getElementById('stats-cards').innerHTML=`
    <div class="scard2"><div class="ico">📚</div><div class="val">${readCnt}</div><div class="lbl">${t('books')}</div></div>
    <div class="scard2"><div class="ico">✅</div><div class="val">${doneCnt}</div><div class="lbl">${t('doneLabel')}</div></div>
    <div class="scard2"><div class="ico">🔥</div><div class="val">7</div><div class="lbl">${t('streakLabel')}</div></div>
    <div class="scard2"><div class="ico">⭐</div><div class="val">${avg}</div><div class="lbl">${t('rating')}</div></div>
  `;
  const daysShort={uz:['Du','Se','Ch','Pa','Ju','Sh','Ya'],ru:['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],en:['Mo','Tu','We','Th','Fr','Sa','Su']};
  const ds=daysShort[lang];
  document.getElementById('habits-cont').innerHTML=habits.map(h=>`
    <div class="habit-row">
      <div class="habit-name">${h.n}</div>
      <div class="hdots">
        ${h.days.map((d,i)=>`<div class="hdot ${d?(h.c==='g'?'g':'y'):''}" title="${ds[i]}">${d?'✓':''}</div>`).join('')}
      </div>
      <div class="hpct">${Math.round(h.days.filter(Boolean).length/7*100)}%</div>
    </div>
  `).join('');
  const qs=QUOTES[lang]||QUOTES.uz;
  const q=qs[qIdx%qs.length];
  _t('motiv-q','"'+q.q+'"');_t('motiv-a','— '+q.a);
  _t('btn-newq2',t('newQuote'));
}

/* ── PROFILE ── */
function renderProf(){
  _t('pn',prof.name);_t('pt',prof.tagline);_t('pb',prof.bio);
  document.getElementById('ptags').innerHTML=(prof.tags||[]).map(tg=>`<span class="chip chip-gold">${tg}</span>`).join('');
  if(prof.av){
    document.getElementById('pav').innerHTML=`<img src="${prof.av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
    document.getElementById('nav-av-img').src=prof.av;
    document.getElementById('nav-av-img').style.display='block';
    document.getElementById('nav-av-e').style.display='none';
  }
  document.getElementById('p-skills').innerHTML=(prof.skills||[]).map(s=>`
    <div class="sk-item">
      <div class="sk-top"><span class="sk-n">${s.name}</span><span class="sk-p">${s.pct}%</span></div>
      <div class="sk-bar"><div class="sk-fill" style="width:${s.pct}%"></div></div>
    </div>
  `).join('')||`<div class="empty" style="padding:.75rem 0">${t('empty')}</div>`;
  document.getElementById('p-achs').innerHTML=(prof.achievements||[]).map(a=>`
    <div class="ach-item">
      <div class="ach-ico">${a.ico}</div>
      <div class="ach-info"><h5>${a.title}</h5><p>${a.desc}</p><span>${a.date}</span></div>
    </div>
  `).join('')||`<div class="empty" style="padding:.75rem 0">${t('empty')}</div>`;
  document.getElementById('p-socs').innerHTML=(prof.socials||[]).map(s=>`
    <a class="soc-link" href="${s.url.startsWith('http')?s.url:'#'}" target="_blank">
      ${s.ico} ${s.name}<span>${s.url}</span>
    </a>
  `).join('')||`<div class="empty" style="padding:.75rem 0">${t('empty')}</div>`;
}
function upPic(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{prof.av=ev.target.result;sv('MY_prof',prof);renderProf();toast(t('saved'));};
  r.readAsDataURL(f);
}
function saveProf(){
  prof.name=document.getElementById('pe-name').value.trim()||prof.name;
  prof.tagline=document.getElementById('pe-tag').value.trim()||prof.tagline;
  prof.bio=document.getElementById('pe-bio').value.trim()||prof.bio;
  const tgsRaw=document.getElementById('pe-tags').value.trim();
  if(tgsRaw) prof.tags=tgsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  sv('MY_prof',prof);closeM('m-pedit');renderProf();renderDash();toast(t('saved'));
}
function saveSkill(){
  const n=document.getElementById('sk-name').value.trim();
  if(!n){toast(t('fieldRequired'));return;}
  prof.skills.push({name:n,pct:+document.getElementById('sk-pct').value});
  sv('MY_prof',prof);closeM('m-skill');
  document.getElementById('sk-name').value='';renderProf();toast(t('added'));
}
function saveAch(){
  const title=document.getElementById('ach-title').value.trim();
  if(!title){toast(t('fieldRequired'));return;}
  prof.achievements.unshift({ico:document.getElementById('ach-ico').value||'🏆',title,
    desc:document.getElementById('ach-desc').value.trim(),
    date:document.getElementById('ach-date').value.trim()||new Date().getFullYear().toString()});
  sv('MY_prof',prof);closeM('m-ach');
  ['ach-title','ach-desc','ach-date'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  renderProf();toast(t('added'));
}
function saveSoc(){
  const n=document.getElementById('soc-name').value.trim();
  if(!n){toast(t('fieldRequired'));return;}
  prof.socials.push({ico:document.getElementById('soc-ico').value||'🔗',name:n,url:document.getElementById('soc-url').value.trim()||'#'});
  sv('MY_prof',prof);closeM('m-soc');
  ['soc-name','soc-url'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  renderProf();toast(t('added'));
}

function delMat(id){mats=mats.filter(m=>m.id!==id);sv('MY_mats',mats);renderAdm();renderMats();toast(t('deleted'));}
function delRev(id){revs=revs.filter(r=>r.id!==id);sv('MY_revs',revs);renderAdm();renderRevs();toast(t('deleted'));}

/* ── MODALS ── */
function openM(id){
  if(id==='m-pedit'){
    document.getElementById('pe-name').value=prof.name;
    document.getElementById('pe-tag').value=prof.tagline;
    document.getElementById('pe-bio').value=prof.bio;
    document.getElementById('pe-tags').value=(prof.tags||[]).join(', ');
  }
  document.getElementById(id).classList.add('open');
}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{
  document.querySelectorAll('.mo').forEach(m=>{if(e.target===m)m.classList.remove('open');});
});
// swipe down to close on mobile
document.querySelectorAll('.mbox').forEach(box=>{
  let sy=0;
  box.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  box.addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientY-sy>80){
      const mo=box.closest('.mo');if(mo)mo.classList.remove('open');
    }
  },{passive:true});
});

/* ── TOAST ── */
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ── ALL RENDER ── */
function renderAll(){
  renderDash();renderBooks();renderMats();renderRevs();renderRecos();
  renderTasks();renderGoals();renderStats();renderProf();
  setDayLabel();
}

/* ── INIT ── */
applyLang();
</script>
